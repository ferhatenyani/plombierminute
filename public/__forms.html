<!DOCTYPE html>
<!--
  Netlify Forms — hidden detection form.

  Netlify's post-deploy build bot scans deployed HTML for forms marked
  `data-netlify="true"` and registers them server-side. Because the React-
  rendered form may not be reliably detected, we keep a static HTML copy here.

  Field `name` attributes MUST match the React form one-for-one.
-->
<html>
  <body>
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text"     name="bot-field" />
      <input type="text"     name="form-name" value="contact" />
      <input type="text"     name="nom" />
      <input type="email"    name="email" />
      <input type="tel"      name="telephone" />
      <input type="text"     name="objet" />
      <textarea              name="message"></textarea>
    </form>
  </body>
</html>
